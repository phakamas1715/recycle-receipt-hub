<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ระบบบันทึกรับซื้อขยะรีไซเคิล - โรงพยาบาลน้ำพอง</title>
    <meta name="description" content="ระบบบันทึกการรับซื้อขยะรีไซเคิลสำหรับโรงพยาบาลน้ำพอง" />
    <meta name="author" content="Lovable" />
    <meta property="og:title" content="853c0886-6c91-48e8-a871-6540489ce26e" />
    <meta property="og:description" content="Lovable Generated Project" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
    
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap');
      
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: 'Prompt', sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }
      
      body::before {
        content: '';
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: 
          radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
          radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
          radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.2) 0%, transparent 50%);
        pointer-events: none;
        z-index: -1;
      }
      
      #root {
        max-width: 1280px;
        margin: 0 auto;
        padding: 2rem;
        text-align: center;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
      }
      
      .loading-container {
        text-align: center;
        color: white;
        z-index: 10;
      }
      
      .logo {
        height: 6em;
        padding: 1.5em;
        will-change: filter;
        transition: filter 300ms;
      }
      
      .logo:hover {
        filter: drop-shadow(0 0 2em #646cffaa);
      }
      
      .logo.react:hover {
        filter: drop-shadow(0 0 2em #61dafbaa);
      }
      
      @keyframes logo-spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      
      @media (prefers-reduced-motion: no-preference) {
        a:nth-of-type(2) .logo {
          animation: logo-spin infinite 20s linear;
        }
      }
      
      .card {
        padding: 2em;
      }
      
      .read-the-docs {
        color: #888;
      }
      
      .hospital-logo {
        width: 120px;
        height: 120px;
        margin: 0 auto 30px;
        background: linear-gradient(135deg, #ffffff 0%, #f8f9ff 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        position: relative;
        animation: float 3s ease-in-out infinite;
      }
      
      .hospital-logo::before {
        content: '🏥';
        font-size: 48px;
        filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
      }
      
      .hospital-logo::after {
        content: '';
        position: absolute;
        top: -5px;
        left: -5px;
        right: -5px;
        bottom: -5px;
        border-radius: 50%;
        background: linear-gradient(45deg, #667eea, #764ba2, #667eea);
        background-size: 200% 200%;
        animation: gradient-rotate 4s ease infinite;
        z-index: -1;
      }
      
      .system-title {
        font-size: 2.5rem;
        font-weight: 600;
        margin-bottom: 10px;
        text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        background: linear-gradient(135deg, #ffffff 0%, #e8f2ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1.2;
      }
      
      .hospital-name {
        font-size: 1.3rem;
        font-weight: 400;
        margin-bottom: 40px;
        opacity: 0.9;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
      }
      
      .loading-spinner {
        width: 60px;
        height: 60px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-top: 4px solid #ffffff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      
      .loading-text {
        font-size: 1.1rem;
        font-weight: 400;
        opacity: 0.8;
        animation: pulse 2s ease-in-out infinite;
      }
      
      .decorative-elements {
        position: absolute;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
      }
      
      .recycle-icon {
        position: absolute;
        font-size: 2rem;
        opacity: 0.1;
        animation: float-slow 6s ease-in-out infinite;
      }
      
      .recycle-icon:nth-child(1) {
        top: 20%;
        left: 10%;
        animation-delay: 0s;
      }
      
      .recycle-icon:nth-child(2) {
        top: 60%;
        right: 15%;
        animation-delay: 2s;
      }
      
      .recycle-icon:nth-child(3) {
        bottom: 20%;
        left: 20%;
        animation-delay: 4s;
      }
      
      .recycle-icon:nth-child(4) {
        top: 40%;
        right: 30%;
        animation-delay: 1s;
      }
      
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
      }
      
      @keyframes float-slow {
        0%, 100% { transform: translateY(0px) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(5deg); }
      }
      
      @keyframes gradient-rotate {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 0.8; }
        50% { opacity: 1; }
      }
      
      @media (max-width: 768px) {
        .system-title {
          font-size: 2rem;
        }
        
        .hospital-name {
          font-size: 1.1rem;
        }
        
        .hospital-logo {
          width: 100px;
          height: 100px;
          margin-bottom: 25px;
        }
        
        .hospital-logo::before {
          font-size: 40px;
        }
      }
    </style>
  </head>
  <body>
    <div class="decorative-elements">
      <div class="recycle-icon">♻️</div>
      <div class="recycle-icon">🌱</div>
      <div class="recycle-icon">🔄</div>
      <div class="recycle-icon">🌿</div>
    </div>
    
    <div id="root">
      <div class="loading-container">
        <div class="hospital-logo"></div>
        <h1 class="system-title">ระบบบันทึกรับซื้อขยะรีไซเคิล</h1>
        <p class="hospital-name">โรงพยาบาลน้ำพอง</p>
        <div class="loading-spinner"></div>
        <p class="loading-text">กำลังโหลดระบบ...</p>
      </div>
    </div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
